name: build-controller

# Build the PyPlanet controller image and publish it to GitHub Container
# Registry (GHCR) on every push that touches the controller. This both verifies
# the Dockerfile still builds and provides a ready-to-pull image.
#
# Note: GHCR packages are PRIVATE by default, even from a public repo. To let
# others pull the image without authenticating, set the package to public once
# under the repo's Packages settings. Building locally (docker compose up
# --build) needs no GHCR access at all.

on:
  push:
    branches: [ main ]
    paths:
      - 'controller/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/maferick/tm2020-pyplanet-controller

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./controller
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
